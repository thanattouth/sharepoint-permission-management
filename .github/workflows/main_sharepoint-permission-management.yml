# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - sharepoint-permission-management

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout
    env:
      NEXT_PUBLIC_MSAL_CLIENT_ID: ${{ vars.NEXT_PUBLIC_MSAL_CLIENT_ID }}
      NEXT_PUBLIC_MSAL_TENANT_ID: ${{ vars.NEXT_PUBLIC_MSAL_TENANT_ID }}
      NEXT_PUBLIC_TENANT_DOMAIN: ${{ vars.NEXT_PUBLIC_TENANT_DOMAIN }}
      NEXT_PUBLIC_INTERNAL_DOMAINS: ${{ vars.NEXT_PUBLIC_INTERNAL_DOMAINS }}
      NEXT_PUBLIC_TARGET_SITES: ${{ vars.NEXT_PUBLIC_TARGET_SITES }}
      NEXT_PUBLIC_PROTECTED_LIBRARY_NAMES: ${{ vars.NEXT_PUBLIC_PROTECTED_LIBRARY_NAMES }}
      NEXT_PUBLIC_AUDIT_SITE: ${{ vars.NEXT_PUBLIC_AUDIT_SITE }}
      NEXT_PUBLIC_AUDIT_LIST_NAME: ${{ vars.NEXT_PUBLIC_AUDIT_LIST_NAME }}
      NEXT_PUBLIC_AUDIT_LOG_ENABLED: ${{ vars.NEXT_PUBLIC_AUDIT_LOG_ENABLED }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Validate public build configuration
        run: |
          test -n "$NEXT_PUBLIC_MSAL_CLIENT_ID"
          test -n "$NEXT_PUBLIC_MSAL_TENANT_ID"
          test -n "$NEXT_PUBLIC_TARGET_SITES"

      - name: npm install, build, and test
        run: |
          npm ci
          npm audit --audit-level=moderate
          npm run build --if-present
          npm run test --if-present

      - name: Prepare standalone deployment artifact
        run: |
          mkdir -p deploy/.next
          cp -R .next/standalone/. deploy/
          cp -R .next/static deploy/.next/static
          if [ -d public ]; then cp -R public deploy/public; fi
          cp -R scripts deploy/scripts
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('deploy/package.json', 'utf8')); pkg.scripts = { start: 'node scripts/start.js' }; fs.writeFileSync('deploy/package.json', JSON.stringify(pkg, null, 2));"
          test -f deploy/server.js
          test -f deploy/.next/BUILD_ID

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sharepoint-permission-management'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BAC014DBA0424239829D85E2CEFC39A9 }}
